<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Marvel Reading Vault v3</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>
          <h1>Marvel Reading Vault</h1>
          <p>Canonical Roadmap Archive</p>
        </div>
      </div>

      <nav class="nav" aria-label="Main navigation">
        <button class="nav-link active" data-view="dashboard"><span>⌂</span>Dashboard</button>
        <button class="nav-link" data-view="master"><span>⇄</span>Master Flow</button>
        <button class="nav-link" data-view="phases"><span>◫</span>Phases</button>
        <button class="nav-link" data-view="roadmaps"><span>☷</span>Roadmaps</button>
        <button class="nav-link" data-view="events"><span>◆</span>Events</button>
        <button class="nav-link" data-view="stories"><span>★</span>Great Stories</button>
        <button class="nav-link" data-view="ultimate"><span>U</span>Ultimate Universe</button>
        <button class="nav-link" data-view="elseworlds"><span>∞</span>Elseworlds & Crossovers</button>
        <button class="nav-link" data-view="stats"><span>▥</span>Stats</button>
        <button class="nav-link" data-view="settings"><span>⚙</span>Settings</button>
      </nav>

      <div class="sidebar-foot">
        <div class="save-state"><span class="status-dot"></span><span>Shared issue progress</span></div>
        <small id="dataVersion"></small>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-btn" id="menuBtn" aria-label="Toggle navigation">☰</button>
          <div>
            <p class="eyebrow">Personal Marvel reading system</p>
            <h2 id="pageTitle">Dashboard</h2>
          </div>
        </div>

        <div class="topbar-actions">
          <label class="global-search">
            <span>⌕</span>
            <input id="globalSearch" type="search" placeholder="Search any run, issue, writer or event…" autocomplete="off" />
          </label>
          <label class="compact-control">
            <span>Route</span>
            <select id="routeMode">
              <option value="peak">Peak only</option>
              <option value="core">Peak + Essential</option>
              <option value="recommended">Recommended route</option>
              <option value="curated">Full curated route</option>
              <option value="completionist">Completionist</option>
            </select>
          </label>
          <button class="icon-control" id="themeToggle" type="button" aria-label="Toggle theme">☀</button>
        </div>
      </header>

      <div class="search-results" id="searchResults" hidden></div>

      <section class="view active" id="dashboard"></section>
      <section class="view" id="master"></section>
      <section class="view" id="phases"></section>
      <section class="view" id="roadmaps"></section>
      <section class="view" id="events"></section>
      <section class="view" id="stories"></section>
      <section class="view" id="ultimate"></section>
      <section class="view" id="elseworlds"></section>
      <section class="view" id="stats"></section>
      <section class="view" id="settings"></section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <dialog class="issue-dialog" id="issueDialog">
    <form method="dialog" class="dialog-shell">
      <button class="dialog-close" value="close" aria-label="Close">×</button>
      <div id="issueDialogBody"></div>
    </form>
  </dialog>

  <script src="js/catalog.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
